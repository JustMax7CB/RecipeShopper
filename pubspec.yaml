name: recipeshopper
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  # service
  appwrite: ^14.0.0
  
  # dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # local db
  hive: ^2.2.3

  # state management
  provider: ^6.1.2

  # custom widgets
  flutter_svg: ^2.0.17
  image_picker: ^1.1.2
  flutter_slidable: ^4.0.0
  animated_toggle_switch: ^0.8.4
  
  path_provider: ^2.1.5
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  hive_listener: ^1.2.1
  hive_flutter: ^1.1.0
  flutter_bugfender: ^3.1.0
  shared_preferences: ^2.5.2
  package_info_plus: ^8.3.0
  flutter_dotenv: ^5.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.15
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4




dependency_overrides:
  flutter_web_auth_2: ^4.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - lib/assets/images/
    - lib/assets/icons/
    - lib/assets/fonts/Kalam/
    - .env

  fonts:
    - family: Kalam
      fonts:
        - asset: lib/assets/fonts/Kalam/Kalam-Bold.ttf
          weight: 600
        - asset: lib/assets/fonts/Kalam/Kalam-Light.ttf
          weight: 200
        - asset: lib/assets/fonts/Kalam/Kalam-Regular.ttf
          weight: 400

    - family: Fredoka
      fonts:
        - asset: lib/assets/fonts/Fredoka/Fredoka-Bold.ttf
          weight: 600
        - asset: lib/assets/fonts/Fredoka/Fredoka-Light.ttf
          weight: 200
        - asset: lib/assets/fonts/Fredoka/Fredoka-Regular.ttf
          weight: 400

    - family: Oswald
      fonts:
        - asset: lib/assets/fonts/Oswald/Oswald-Bold.ttf
          weight: 600
        - asset: lib/assets/fonts/Oswald/Oswald-Light.ttf
          weight: 200
        - asset: lib/assets/fonts/Oswald/Oswald-Regular.ttf
          weight: 400