workflows:
  flutter-debug-build:
    name: Flutter Debug Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      vars:
        PROJECT_NAME: "RecipeShopper"

    scripts:
      - name: Clone repository
        script: git clone $CM_REPO $CM_BUILD_DIR

      - name: Set up Flutter
        script: flutter doctor

      - name: Install dependencies
        script: flutter pub get

      - name: Build Android Debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - "justmax7cb@gmail.com"
